function extractIncidentId(text){
  const m = String(text||"").toUpperCase().match(/INC-\d{3,6}/);
  return m ? m[0] : null;
}

function extractServiceName(text){
  const lower = String(text||"").toLowerCase();
  return ALL_SERVICES.find(s => lower.includes(s.toLowerCase())) || null;
}

function buildBlastRadius(service, maxHops=3){
  const adj = new Map();
  DEPENDENCIES.forEach(([a,b])=>{
    if(!adj.has(a)) adj.set(a, []);
    adj.get(a).push(b);
  });
  const seen = new Set([service]);
  const out = [];
  let frontier = [service];
  for(let hop=1; hop<=maxHops; hop++){
    const next = [];
    frontier.forEach(src=>{
      (adj.get(src)||[]).forEach(dst=>{
        if(!seen.has(dst)){
          seen.add(dst);
          next.push(dst);
          out.push({name:dst,hop});
        }
      });
    });
    if(next.length===0) break;
    frontier = next;
  }
  return out;
}

function findDependents(target){
  return DEPENDENCIES.filter(([,dst])=>dst===target).map(([src])=>src);
}

function answerNlQuery(text, context){
  const raw = String(text||"").trim();
  const lower = raw.toLowerCase();
  const incident = extractIncidentId(raw) || context.lastIncident;
  const service = extractServiceName(raw) || context.lastService || (incident && INCIDENT_FACTS[incident]?.service) || null;

  if((lower.includes("incident") || lower.includes("incidents")) &&
     (lower.includes("impact") || lower.includes("affect")) &&
     (lower.includes(">") || lower.includes("more than") || lower.includes("over")) &&
     lower.includes("service")){
    const nMatch = lower.match(/(?:>|more than|over)\s*(\d+)/);
    const minServices = nMatch ? parseInt(nMatch[1], 10) + 1 : 3;
    const ranked = Object.entries(INCIDENT_FACTS)
      .map(([id, f]) => {
        const radius = buildBlastRadius(f.service, 3);
        const impacted = Array.from(new Set([f.service, ...radius.map(r => r.name)]));
        return { id, service: f.service, impactedCount: impacted.length, impacted };
      })
      .filter(x => x.impactedCount >= minServices)
      .sort((a, b) => b.impactedCount - a.impactedCount)
      .slice(0, 6);

    if(ranked.length === 0){
      return {
        text: `No incidents found impacting ${minServices} or more services in the current demo window.`,
        ctx: { lastIncident: incident, lastService: service }
      };
    }

    const lines = ranked.map(x =>
      `${x.id} (${x.service}) impacts ${x.impactedCount} services: ${x.impacted.slice(0, 6).join(", ")}${x.impacted.length > 6 ? "..." : ""}`
    );

    return {
      text: `Yes. Incidents impacting ${minServices} or more services (direct + dependency blast radius): ${lines.join(" | ")}`,
      ctx: { lastIncident: ranked[0].id, lastService: ranked[0].service }
    };
  }

  if((lower.includes("root cause") || lower.includes("why") || lower.includes("fail")) && incident && INCIDENT_FACTS[incident]){
    const f = INCIDENT_FACTS[incident];
    return {
      text: `${incident} affected ${f.service}. RCA path: ${incident} ->[AFFECTS]-> ${f.service} ->[DEPENDS_ON]-> ${f.rootCause === "HighCPU" ? "ServiceB" : "DbService"} ->[CAUSED_BY]-> ${f.rootCause}. Evidence: ${f.episode} (confidence ${f.confidence.toFixed(2)}).`,
      ctx: { lastIncident: incident, lastService: f.service }
    };
  }

  if(lower.includes("blast radius") && service){
    const hops = (raw.match(/(\d+)\s*hops?/) || [])[1];
    const maxHops = hops ? Math.max(1, Math.min(6, parseInt(hops,10))) : 3;
    const radius = buildBlastRadius(service, maxHops);
    if(radius.length===0){
      return { text:`No downstream dependencies found for ${service} up to ${maxHops} hops.`, ctx:{ lastService: service, lastIncident: incident } };
    }
    const grouped = [];
    for(let h=1; h<=maxHops; h++){
      const names = radius.filter(r=>r.hop===h).map(r=>r.name);
      if(names.length) grouped.push(`${h}-hop: ${names.join(", ")}`);
    }
    return {
      text: `Blast radius for ${service} (${maxHops} hops): ${grouped.join(" | ")}. Recommend prioritizing circuit breakers on the 1-hop edges first.`,
      ctx: { lastService: service, lastIncident: incident }
    };
  }

  if((lower.includes("depend on") || lower.includes("depends on") || lower.includes("upstream")) && service){
    const dependents = findDependents(service);
    return {
      text: dependents.length
        ? `Services that depend on ${service}: ${dependents.join(", ")}.`
        : `No services currently depend on ${service} in this demo graph.`,
      ctx: { lastService: service, lastIncident: incident }
    };
  }

  if((lower.includes("which team") || lower.includes("owner") || lower.includes("owns")) && service){
    const owner = TEAM_OWNERS[service];
    return {
      text: owner
        ? `${owner} owns ${service}. Suggested escalation channel: #${owner.toLowerCase().replace(/[^a-z0-9]+/g,"-")}.`
        : `Owner team for ${service} is not mapped in this demo dataset.`,
      ctx: { lastService: service, lastIncident: incident }
    };
  }

  if(lower.includes("regression") || lower.includes("introduced")){
    return {
      text: `Regression hit in last window: INC-901 ->[INTRODUCED_BY]-> v2.3.1 ->[CONTAINS]-> MemLeak (AuthService). Action: rollback to v2.3.0 (ep-004).`,
      ctx: { lastIncident:"INC-901", lastService:"AuthService" }
    };
  }

  if(lower.includes("cycle")){
    return {
      text: `Cycle detected on :DEPENDS_ON (depth 2): ServiceB -> CacheLayer -> ServiceB. This can amplify repeated incidents and retries.`,
      ctx: { lastService:"ServiceB", lastIncident: incident }
    };
  }

  if(incident && INCIDENT_FACTS[incident]){
    const f = INCIDENT_FACTS[incident];
    return {
      text: `${incident} maps to service ${f.service} with likely cause ${f.rootCause}. Ask for "blast radius", "owner", or "root cause" for deeper traversal.`,
      ctx: { lastIncident: incident, lastService: f.service }
    };
  }

  return {
    text: `I can answer incident RCA, blast radius, owner team, cycle detection, and regression attribution. Try: "why did INC-456 fail?" or "blast radius of ServiceA up to 3 hops".`,
    ctx: { lastIncident: incident, lastService: service }
  };
}

const SQL_VS_CYPHER = [
  { title:"3-hop root cause traversal",
    cypher:`MATCH (i:Incident {id:"INC-456"})
  -[:AFFECTS]->(s)-[:DEPENDS_ON]->(d)-[:CAUSED_BY]->(r)
RETURN i.id, s.name, d.name, r.type`,
    sql:`-- 3 recursive JOINs + CTE, FK columns must exist
WITH hop1 AS (SELECT * FROM incident_service WHERE incident_id='INC-456'),
     hop2 AS (SELECT h.*, ds.target FROM hop1 h
              JOIN service_deps ds ON ds.source = h.service),
     hop3 AS (SELECT h.*, rc.type FROM hop2 h
              JOIN service_rootcause rc ON rc.service = h.target)
SELECT * FROM hop3;  -- brittle, rewrite per depth`},
  { title:"Variable-length blast radius (1..5)",
    cypher:`MATCH path=(i:Incident {id:"INC-456"})-[:AFFECTS*1..5]->(s)
RETURN DISTINCT s.name, length(path) AS hops`,
    sql:`-- impossible in standard SQL without recursive CTE per depth
-- and even then cannot express variable upper bound cleanly`},
  { title:"Cycle detection",
    cypher:`MATCH path=(s:Service)-[:DEPENDS_ON*2..8]->(s)
RETURN [n IN nodes(path) | n.name] AS cycle`,
    sql:`-- requires recursive CTE w/ visited-set tracking, vendor-specific`},
  { title:"Shortest path",
    cypher:`MATCH p=shortestPath((a:Service{name:"ApiGateway"})-[:DEPENDS_ON*]-(b:Service{name:"DbService"}))
RETURN [n IN nodes(p) | n.name]`,
    sql:`-- no native SQL primitive; usually export to graph engine`},
  { title:"Multi-hop with type filters",
    cypher:`MATCH (i:Incident)-[:AFFECTS]->(s)-[:OWNS]-(t:Team)
WHERE i.severity<=2 RETURN t.name, count(i)`,
    sql:`-- doable but requires 3 joins + pre-materialized edges table`},
  { title:"Regression path attribution",
    cypher:`MATCH (i:Incident)-[:INTRODUCED_BY]->(d:Deployment)
WHERE d.deployedAt > date()-7
RETURN i.id, d.version, d.deployedBy`,

];

function LiveQueryPanel(){
  const stages = [
    { name:"Episodic Retrieval", detail:"pgvector top-k=10, HNSW", ms:18 },
    { name:"Graph Traversal",    detail:"3-hop Cypher on Neo4j GDS", ms:48 },
    { name:"Kusto Telemetry",    detail:"CPU/memory series last 1h", ms:210 },
    { name:"Multi-Hop Reasoning",detail:"join episodes + graph path + signals", ms:90 },
    { name:"LLM Synthesis",      detail:"GPT-4, KV cache hit 71%", ms:380 },
    { name:"Memory Store",       detail:"encode → index → persist", ms:60 },
  ];
  const [active,setActive] = useState(-1);
  const [running,setRunning] = useState(false);
  const run = ()=>{
    setRunning(true); setActive(-1);
    stages.forEach((_,i)=>setTimeout(()=>setActive(i), i*550));
    setTimeout(()=>setRunning(false), stages.length*550+200);
  };
  return (
    <Card>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="font-semibold text-white">Live Query Pipeline</h3>
          <p className="text-xs text-slate-400">Q: "Why did ServiceA fail and what's the blast radius?"</p>
        </div>
        <button onClick={run} disabled={running}
          className="px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white text-sm font-semibold">
          {running?"Running…":"Execute"}
        </button>
      </div>
      <div className="space-y-2">
        {stages.map((s,i)=>{
          const done = active>i, cur = active===i;

function ReasoningChainPanel(){
  const seeds = {
    "INC-456":[
      { rel:"AFFECTS", target:"ServiceA" },
      { rel:"DEPENDS_ON", target:"ServiceB" },
      { rel:"CAUSED_BY", target:"HighCPU" },
    ],
    "INC-789":[
      { rel:"AFFECTS", target:"ServiceC" },
      { rel:"DEPENDS_ON", target:"DbService" },
      { rel:"CAUSED_BY", target:"ConnPoolExhaustion" },
    ],
    "INC-234":[
      { rel:"AFFECTS", target:"DbService" },
      { rel:"DEPENDS_ON", target:"ConnPool" },
      { rel:"CAUSED_BY", target:"OvernightBatch" },
    ],
    "INC-901":[
      { rel:"INTRODUCED_BY", target:"v2.3.1" },
      { rel:"CONTAINS", target:"MemLeak" },
    ],
  };
  const [seed,setSeed] = useState("INC-456");
  const [step,setStep] = useState(0);
  const hops = seeds[seed];
  const run = ()=>{
    setStep(0);
    hops.forEach((_,i)=>setTimeout(()=>setStep(i+1),(i+1)*700));
  };
  const cypher = `MATCH (i:Incident {id:"${seed}"})\n` +
    hops.map((h,i)=>`  -[:${h.rel}]->(n${i})`).join("\n")+
    `\nRETURN i, ${hops.map((_,i)=>"n"+i).join(", ")}`;
  return (
    <div className="grid grid-cols-12 gap-4">
      <Card className="col-span-12 lg:col-span-7">
        <div className="flex items-center gap-3 mb-4">
          <span className="text-sm text-slate-300">Seed:</span>
          <select value={seed} onChange={e=>{setSeed(e.target.value);setStep(0);}}
            className="bg-slate-900 border border-slate-700 rounded-md px-2 py-1 text-sm text-white">
            {Object.keys(seeds).map(k=><option key={k}>{k}</option>)}
          </select>
          <button onClick={run} className="px-3 py-1.5 rounded-md bg-violet-600 hover:bg-violet-500 text-white text-xs font-semibold">Execute traversal</button>
        </div>
        <div className="space-y-2">
          <div className="flex items-center gap-2">
            <div className="w-10 h-10 rounded-full bg-rose-500/20 border-2 border-rose-500 flex items-center justify-center text-xs font-bold text-white">{seed.split("-")[1]}</div>
            <span className="text-sm text-white font-semibold">{seed}</span>
          </div>
          {hops.map((h,i)=>(
            <div key={i} className={`ml-5 pl-4 border-l-2 ${step>i?"border-violet-500":"border-slate-700"}`}>
              <div className="text-[11px] font-mono text-slate-400 py-1">↓ [:{h.rel}]</div>
              <div className={`flex items-center gap-2 transition-opacity ${step>i?"opacity-100":"opacity-30"}`}>
                <div className="w-10 h-10 rounded-full bg-cyan-500/20 border-2 border-cyan-500 flex items-center justify-center text-[10px] font-bold text-white">n{i}</div>
                <span className="text-sm text-white">{h.target}</span>
              </div>
            </div>
          ))}
        </div>
      </Card>
      <Card className="col-span-12 lg:col-span-5">
        <h3 className="font-semibold text-white mb-2">Generated Cypher</h3>
        <pre className="text-xs bg-slate-950 border border-slate-800 rounded-lg p-3 text-cyan-300 overflow-x-auto scroll-thin">{cypher}</pre>
        <div className="mt-3 text-xs text-slate-400">
          Depth: {hops.length} · Step: {step}/{hops.length}
        </div>
      </Card>
    </div>
  );
}

/* Minimal markdown -> HTML renderer for chat answers.
   Supports: **bold**, *italic*, `code`, bullet lists, blank-line paragraphs. */
function renderMarkdown(src){
  if(!src) return "";
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g,'<code class="px-1 py-0.5 rounded bg-slate-900 border border-slate-700 text-emerald-300 text-[12px]">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong class="text-white">$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em class="text-slate-300">$1</em>');
  const lines = src.split(/\r?\n/);
  const html = [];
  let inList = false;
  const closeList = () => { if(inList){ html.push("</ul>"); inList = false; } };
  for(const raw of lines){
    const line = raw.trimEnd();
    if(/^\s*-\s+/.test(line)){
      if(!inList){ html.push('<ul class="list-disc ml-5 space-y-1 my-1">'); inList = true; }
      html.push("<li>"+inline(line.replace(/^\s*-\s+/,""))+"</li>");
    } else if(line === ""){
      closeList();
      html.push("<div class='h-1'></div>");
    } else {
      closeList();
      html.push('<p class="my-1">'+inline(line)+"</p>");
    }
  }
  closeList();
  return html.join("");
}

/* =========================================================
   Graph Viewer — live force-directed canvas of the Neo4j graph
   ========================================================= */
const NODE_COLORS = {
  Service: "#06b6d4", Incident: "#f43f5e", RootCause: "#f59e0b",
  Team: "#a78bfa", Deployment: "#10b981",
};

function GraphVizPanel(){
  const canvasRef = useRef(null);
  const [snap,setSnap] = useState(null);
  const [status,setStatus] = useState("loading");
  const [labels,setLabels] = useState({Service:true,Incident:false,RootCause:true,Team:true,Deployment:false});
  const [linkDist,setLinkDist] = useState(60);
  const [charge,setCharge] = useState(-80);
  const [maxIncidents,setMaxIncidents] = useState(60);
  const [search,setSearch] = useState("");
  const [hoverId,setHoverId] = useState(null);
  const [relayoutNonce,setRelayoutNonce] = useState(0);
  const simRef = useRef({nodes:[], links:[], raf:0, dragging:null, pan:{x:0,y:0}, zoom:1, alpha:1});

  // fetch snapshot
  useEffect(()=>{
    let cancel = false;
    fetch("http://127.0.0.1:8765/graph").then(r=>r.json()).then(j=>{
      if(cancel) return;
      setSnap(j);
      setStatus("ok");
    }).catch(e=>{
      if(!cancel){ setStatus("offline"); }
    });
    return ()=>{ cancel = true; };
  },[]);

  // rebuild simulation when filters or data change
  useEffect(()=>{
    if(!snap) return;
    const keep = new Set(Object.keys(labels).filter(k=>labels[k]));
    // subsample Incidents so the canvas stays readable
    let incidentsKept = 0;
    const nodeMap = new Map();
    for(const n of snap.nodes){
      if(!keep.has(n.label)) continue;
      if(n.label==="Incident"){
        if(incidentsKept >= maxIncidents) continue;
        incidentsKept++;
      }
      if(search && !(n.id.toLowerCase().includes(search.toLowerCase()) ||
                     (n.name||"").toLowerCase().includes(search.toLowerCase()))){
        if(n.label!=="Service" && n.label!=="Team") continue; // always keep services+teams as anchors
      }
      nodeMap.set(n.id, { ...n, x: Math.random()*800-400, y: Math.random()*500-250, vx:0, vy:0 });
    }
    const links = [];
    for(const e of snap.edges){
      if(nodeMap.has(e.source) && nodeMap.has(e.target)){
        links.push({ source: nodeMap.get(e.source), target: nodeMap.get(e.target), type: e.type });
      }
    }
    const nodes = [...nodeMap.values()];

    // Pre-compute a static layout: run the force simulation headlessly, then freeze.
    // Nothing animates on screen; nodes only move when the user drags them.
    const ITER = 260;
    for(let step=0; step<ITER; step++){
      const a0 = 1 - step/ITER; // cooling schedule
      // repulsion
      for(let i=0;i<nodes.length;i++){
        const a = nodes[i];
        for(let j=i+1;j<nodes.length;j++){
          const b = nodes[j];
          let dx = a.x-b.x, dy = a.y-b.y;
          let d2 = dx*dx+dy*dy + 0.01;
          if(d2 > 40000) continue;
          const f = charge / d2;
          const d = Math.sqrt(d2);
          const fx = f * dx/d, fy = f * dy/d;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
      }
      // springs
      for(const l of links){
        const dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
        const d = Math.sqrt(dx*dx+dy*dy) + 0.01;
        const f = (d - linkDist) * 0.02;
        const fx = f * dx/d, fy = f * dy/d;
        l.source.vx += fx; l.source.vy += fy;
        l.target.vx -= fx; l.target.vy -= fy;
      }
      // gravity + integrate + damping
      for(const n of nodes){
        n.vx += (0 - n.x) * 0.002;
        n.vy += (0 - n.y) * 0.002;
        n.vx *= 0.72; n.vy *= 0.72;
        n.x += n.vx * a0; n.y += n.vy * a0;
      }
    }
    // Freeze: zero out velocities. tick() will only draw.
    for(const n of nodes){ n.vx = 0; n.vy = 0; }

    simRef.current.nodes = nodes;
    simRef.current.links = links;
    simRef.current.alpha = 0;
  },[snap, labels, maxIncidents, search, linkDist, charge, relayoutNonce]);

  // force simulation loop
  useEffect(()=>{
    const cvs = canvasRef.current;
    if(!cvs) return;
    const ctx = cvs.getContext("2d");
    const fit = ()=>{
      const r = cvs.getBoundingClientRect();
      cvs.width = r.width * devicePixelRatio;
      cvs.height = r.height * devicePixelRatio;
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    };
    fit();
    window.addEventListener("resize", fit);

    const tick = ()=>{
      const s = simRef.current;
      const {nodes, links, pan, zoom} = s;
      const w = cvs.clientWidth, h = cvs.clientHeight;
      const cx = w/2, cy = h/2;

      // No physics here — nodes are placed once by the pre-computed layout above.
      // The only node that ever changes position is the one the user is dragging
      // (handled directly in onPointerMove).
      // draw
      ctx.clearRect(0,0,w,h);
      ctx.save();
      ctx.translate(cx + pan.x, cy + pan.y);
      ctx.scale(zoom, zoom);
      // edges
      ctx.lineWidth = 1;
      for(const l of links){
        ctx.strokeStyle = l.type==="DEPENDS_ON" ? "rgba(6,182,212,0.45)"
                         : l.type==="AFFECTS"   ? "rgba(244,63,94,0.35)"
                         : l.type==="CAUSED_BY" ? "rgba(245,158,11,0.45)"
                         : l.type==="OWNS"      ? "rgba(167,139,250,0.4)"
                         : "rgba(16,185,129,0.35)";
        ctx.beginPath();
        ctx.moveTo(l.source.x, l.source.y);
        ctx.lineTo(l.target.x, l.target.y);
        ctx.stroke();
      }
      // nodes
      for(const n of nodes){
        const color = NODE_COLORS[n.label] || "#94a3b8";
        const r = n.label==="Service" ? 8 : n.label==="Team" ? 7 : n.label==="RootCause" ? 6 : 4;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI*2);
        ctx.fill();
        if(hoverId === n.id){
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2; ctx.stroke();
        }
        if(n.label==="Service" || n.label==="Team" || n.label==="RootCause" || hoverId === n.id){
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "11px ui-sans-serif";
          ctx.fillText(n.name || n.id, n.x + r + 2, n.y + 3);
        }
      }
      ctx.restore();
      simRef.current.raf = requestAnimationFrame(tick);
    };
    simRef.current.raf = requestAnimationFrame(tick);
    return ()=>{
      cancelAnimationFrame(simRef.current.raf);
      window.removeEventListener("resize", fit);
    };
  },[linkDist, charge, hoverId]);

  // pointer interactions: drag nodes, pan, zoom, hover
  const onPointerDown = e => {
    const cvs = canvasRef.current, r = cvs.getBoundingClientRect();
    const {pan, zoom, nodes} = simRef.current;
    const mx = (e.clientX - r.left - r.width/2 - pan.x) / zoom;
    const my = (e.clientY - r.top  - r.height/2 - pan.y) / zoom;
    const hit = nodes.find(n => (n.x-mx)**2 + (n.y-my)**2 < 100);
    if(hit){ simRef.current.dragging = hit; }
    else   { simRef.current.panning = {x: e.clientX, y: e.clientY, pan0:{...pan}}; }
  };
  const onPointerMove = e => {
    const cvs = canvasRef.current, r = cvs.getBoundingClientRect();
    const {pan, zoom, nodes} = simRef.current;
    if(simRef.current.dragging){
      const mx = (e.clientX - r.left - r.width/2 - pan.x) / zoom;
      const my = (e.clientY - r.top  - r.height/2 - pan.y) / zoom;
      simRef.current.dragging.x = mx;
      simRef.current.dragging.y = my;
      return;
    }
    if(simRef.current.panning){
      const p = simRef.current.panning;
      simRef.current.pan = { x: p.pan0.x + (e.clientX - p.x), y: p.pan0.y + (e.clientY - p.y) };
      return;
    }
    const mx = (e.clientX - r.left - r.width/2 - pan.x) / zoom;
    const my = (e.clientY - r.top  - r.height/2 - pan.y) / zoom;
    const hit = nodes.find(n => (n.x-mx)**2 + (n.y-my)**2 < 100);
    setHoverId(hit ? hit.id : null);
  };
  const onPointerUp = () => {
    simRef.current.dragging = null;
    simRef.current.panning = null;
  };
  const onWheel = e => {
    e.preventDefault();
    const z = simRef.current.zoom;
    simRef.current.zoom = Math.max(0.2, Math.min(4, z * (e.deltaY < 0 ? 1.1 : 0.9)));
  };

  const hoverNode = snap && hoverId ? (simRef.current.nodes.find(n=>n.id===hoverId) || null) : null;

  return (
    <div className="grid grid-cols-12 gap-4">
      <Card className="col-span-12 lg:col-span-9">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-white">Live Graph Viewer</h3>
          <div className="flex items-center gap-2">
            <Chip color={status==="ok"?"green":status==="offline"?"red":"blue"}>
              {status==="ok" ? `${snap?.counts?.nodes||0} nodes · ${snap?.counts?.edges||0} edges`
                : status==="offline" ? "chat_server offline" : "loading…"}
            </Chip>
          </div>
        </div>
        <div className="relative border border-slate-800 rounded-lg bg-slate-950 overflow-hidden"
             style={{height: 520}}>
          <canvas ref={canvasRef}
            onPointerDown={onPointerDown}
            onPointerMove={onPointerMove}
            onPointerUp={onPointerUp}
            onPointerLeave={onPointerUp}
            onWheel={onWheel}
            style={{ width: "100%", height: "100%", cursor: hoverId ? "grab" : "default", touchAction:"none" }}/>
          {hoverNode && (
            <div className="absolute top-2 left-2 px-3 py-2 bg-slate-900/90 border border-slate-700 rounded text-xs text-slate-100">
              <div className="font-semibold">{hoverNode.name || hoverNode.id}</div>
              <div className="text-slate-400">
                {hoverNode.label}
                {hoverNode.tier ? ` · tier ${hoverNode.tier}` : ""}
                {hoverNode.severity ? ` · sev ${hoverNode.severity}` : ""}
              </div>
            </div>
          )}
          <div className="absolute bottom-2 right-2 flex gap-2 text-[10px] text-slate-300 bg-slate-900/70 border border-slate-800 rounded px-2 py-1">
            {Object.entries(NODE_COLORS).map(([k,c])=>(
              <span key={k} className="flex items-center gap-1">
                <span className="w-2 h-2 rounded-full" style={{background:c}}/>{k}
              </span>
            ))}
          </div>
        </div>
      </Card>

      <Card className="col-span-12 lg:col-span-3">
        <h3 className="font-semibold text-white mb-3">Controls</h3>

        <div className="mb-3">
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="search node id or name…"
            className="w-full bg-slate-900 border border-slate-700 rounded-md px-2 py-1 text-xs text-white"/>
        </div>

        <div className="mb-3">
          <div className="text-xs text-slate-300 mb-1">Node types</div>
          <div className="grid grid-cols-2 gap-1">
            {Object.keys(labels).map(k=>(
              <label key={k} className="flex items-center gap-2 text-xs text-slate-200">
                <input type="checkbox" checked={labels[k]}
                  onChange={e=>setLabels(s=>({...s,[k]:e.target.checked}))}/>
                <span className="w-2 h-2 rounded-full" style={{background: NODE_COLORS[k]}}/>
                {k}
              </label>
            ))}
          </div>
        </div>

        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="text-slate-300">Max incidents</span>
            <span className="font-mono text-white">{maxIncidents}</span>
          </div>
          <input type="range" min={10} max={400} step={10}
            value={maxIncidents} onChange={e=>setMaxIncidents(+e.target.value)}
            className="w-full accent-violet-500"/>
        </div>

        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="text-slate-300">Link distance</span>
            <span className="font-mono text-white">{linkDist}</span>
          </div>
          <input type="range" min={20} max={200} step={5}
            value={linkDist} onChange={e=>setLinkDist(+e.target.value)}
            className="w-full accent-violet-500"/>
        </div>

        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="text-slate-300">Repulsion</span>
            <span className="font-mono text-white">{charge}</span>
          </div>
          <input type="range" min={-300} max={-20} step={5}
            value={charge} onChange={e=>setCharge(+e.target.value)}
            className="w-full accent-violet-500"/>
        </div>

        <div className="text-[11px] text-slate-400 leading-relaxed mt-2">
          drag nodes · scroll to zoom · drag background to pan · hover for details
        </div>
        <button
          onClick={()=>{ setRelayoutNonce(n=>n+1); }}
          className="mt-3 w-full px-3 py-1.5 rounded-md bg-violet-600 hover:bg-violet-500 text-white text-xs font-semibold">
          Relayout
        </button>
      </Card>
    </div>
  );
}

function AgentChatPanel(){
  const [msgs,setMsgs] = useState([
    { role:"sys", text:"Graph-grounded chat. Questions are translated to Cypher and executed against live Neo4j (bolt://localhost:7688). If the chat_server is offline the panel falls back to in-browser rules." },
    { role:"asst", text:"Ask me anything about the seeded graph — incidents, root causes (DNS, CPU, MemLeak, ConnPool…), blast radius, dependents, owners, cycles, regressions." },
  ]);
  const [input,setInput] = useState("");
  const contextRef = useRef({ lastIncident:null, lastService:null });
  const presets = [
    "Any incidents related to DNS?",
    "Any incidents impact more than 3 services?",
    "Blast radius of ServiceA up to 3 hops",
    "Which team owns DbService?",
    "Detect cycles",
    "Regressions introduced by deployments",
    "Why did INC-1008 fail?",
    "Which services depend on DbService?",
    "Incidents on Azure Blob storage",
    "Memory leak in auth",
    "Cross-az throttling impacting payments",
    "Which teams own services in the blast radius of CacheLayer up to 2 hops?",
    "Incidents whose root cause cascades through ServiceB to CacheLayer",
    "Regressions from deployments that affect BillingAPI downstream",
    "Root cause of the highest-severity incident on SearchSvc",
  ];
  const send = async text => {
    if(!text.trim()) return;
    setMsgs(m=>[...m,{role:"user",text},{role:"asst",text:"…thinking (querying Neo4j)"}]);
    setInput("");
    let reply = null;
    let trace = null;
    try {
      const r = await fetch("http://127.0.0.1:8765/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ question: text })
      });
      if(r.ok){
        const j = await r.json();
        reply = (j.answer || "(empty)");
        trace = { handler: j.handler, evidence: j.evidence || [], trace: j.trace || {} };
      }
    } catch(_e){ /* server offline -> fallback */ }
    if(reply === null){
      const out = answerNlQuery(text, contextRef.current);
      contextRef.current = { ...contextRef.current, ...out.ctx };
      reply = "[offline-fallback] " + out.text;
    }
    setMsgs(m=>{
      const base = m.slice(0,-1); // drop the …thinking placeholder
      return [...base,{role:"asst",text:reply,trace}];
    });
  };
  return (
    <div className="grid grid-cols-12 gap-4">
      <Card className="col-span-12 lg:col-span-9">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-white">IcM Agent Chat</h3>
          <Chip color="green">claude-sonnet-4-6</Chip>
        </div>
        <div className="border border-slate-800 rounded-lg bg-slate-950 p-3 h-[420px] overflow-y-auto scroll-thin space-y-3">
          {msgs.map((m,i)=>(
            <div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"}`}>
              <div className={`max-w-[80%] px-3 py-2 rounded-lg text-sm
                ${m.role==="user"?"bg-violet-600 text-white":
                  m.role==="sys"?"bg-slate-800/50 text-slate-400 text-xs italic":"bg-slate-800 text-slate-100"}`}>
                {m.role==="asst"
                  ? <div className="leading-relaxed"
                         dangerouslySetInnerHTML={{__html: renderMarkdown(m.text)}}/>
                  : <div className="whitespace-pre-wrap">{m.text}</div>}
                {m.trace && (
                  <details className="mt-2 border-t border-slate-700 pt-2">
                    <summary className="text-[11px] text-emerald-400 cursor-pointer select-none">
                      show reasoning trace — handler: {m.trace.handler} · {(m.trace.trace?.cypher_steps?.length||0)} Cypher step(s) · {m.trace.trace?.elapsed_ms} ms
                    </summary>
                    <div className="mt-2 space-y-2 text-[11px]">
                      {m.trace.trace?.entities && (
                        <div className="text-slate-400">
                          entities: {JSON.stringify(m.trace.trace.entities)}
                        </div>
                      )}
                      {(m.trace.trace?.cypher_steps||[]).map((s,k)=>(
                        <div key={k} className="bg-slate-950 border border-slate-800 rounded p-2">
                          <div className="text-amber-300 mb-1">[{k+1}] {s.note} — {s.rows} row(s) · {s.elapsed_ms} ms</div>
                          <pre className="text-cyan-300 whitespace-pre-wrap font-mono text-[11px] leading-tight">{s.cypher}</pre>
                          {s.params && Object.keys(s.params).length>0 && (
                            <div className="text-slate-400 mt-1">params: {JSON.stringify(s.params)}</div>
                          )}
                        </div>
                      ))}
                      {m.trace.evidence?.length>0 && (
                        <div className="bg-slate-950 border border-slate-800 rounded p-2">
                          <div className="text-violet-300 mb-1">evidence ({m.trace.evidence.length})</div>
                          <pre className="text-slate-300 whitespace-pre-wrap font-mono text-[11px] leading-tight">{JSON.stringify(m.trace.evidence,null,2)}</pre>
                        </div>
                      )}
                    </div>
                  </details>
                )}
              </div>
            </div>
          ))}
        </div>
        <div className="mt-3 flex gap-2">
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&send(input)}
            placeholder="ask about any incident, service or root cause…"
            className="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"/>
          <button onClick={()=>send(input)} className="px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold">Send</button>
        </div>
      </Card>
      <Card className="col-span-12 lg:col-span-3">
        <h3 className="font-semibold text-white mb-2">Preset queries</h3>
        <div className="space-y-2">
          {presets.map(p=>
            <button key={p} onClick={()=>send(p)}
              className="w-full text-left text-xs px-3 py-2 rounded-md border border-slate-800 bg-slate-900/50 hover:bg-slate-800 text-slate-300">{p}</button>)}
        </div>
      </Card>
    </div>
  );
}

              return (
                <g key={i}>
                  <path d={`M ${p.x-35} ${p.y-20} C ${p.x-80} ${p.y-70}, ${p.x+80} ${p.y-70}, ${p.x+35} ${p.y-20}`}
                    stroke="#475569" fill="none" strokeWidth="1.5" markerEnd="url(#er-arrow)"/>
                  <text x={p.x} y={p.y-55} textAnchor="middle" fill="#94a3b8" fontSize="10">{label}</text>
                </g>
              );
            }
            const A=positions[a],B=positions[b];
            return (
              <g key={i}>
                <line x1={A.x} y1={A.y} x2={B.x} y2={B.y} stroke="#475569" strokeWidth="1.5" markerEnd="url(#er-arrow)"/>
                <text x={(A.x+B.x)/2} y={(A.y+B.y)/2-6} textAnchor="middle" fill="#94a3b8" fontSize="10">{label}</text>
              </g>
            );
          })}
          {SCHEMA_ENTITIES.map(ent=>{
            const p=positions[ent.name];
            return (
              <g key={ent.name} onClick={()=>setSel(ent.name)} style={{cursor:"pointer"}}>
                <rect x={p.x-60} y={p.y-22} width="120" height="44" rx="8"
                  fill={ent.color+(sel===ent.name?"44":"22")} stroke={ent.color} strokeWidth={sel===ent.name?2.5:1.5}/>
                <text x={p.x} y={p.y+5} textAnchor="middle" fill="#fff" fontSize="12" fontWeight="700">{ent.name}</text>
              </g>
            );
          })}
        </svg>
      </Card>
      <Card className="col-span-12 lg:col-span-4">
        <div className="text-xs text-slate-400 mb-1">Entity</div>
        <div className="text-lg font-semibold text-white flex items-center gap-2">
          <span className="w-3 h-3 rounded-full" style={{background:e.color}}/> {e.name}
        </div>
        <div className="mt-4 text-xs text-slate-400 mb-1">Properties</div>
        <div className="flex flex-wrap gap-1">{e.props.map(p=><Chip key={p}>{p}</Chip>)}</div>
        <div className="mt-3 text-xs text-slate-400 mb-1">Indexes</div>
        <div className="flex flex-wrap gap-1">{e.idx.map(p=><Chip key={p} color="amber">{p}</Chip>)}</div>
      </Card>
    </div>
  );
}

function GuardrailsPanel(){
  const cats = ["ALL",...Array.from(new Set(ATLAS.map(a=>a.cat)))];
  const [cat,setCat] = useState("ALL");
  const rows = ATLAS.filter(a=>cat==="ALL"||a.cat===cat);
  const riskColor = r => r==="High"?"red":r==="Medium"?"amber":"green";
  const statusColor = s => s==="Mitigated"?"green":"amber";
  return (
    <Card>
      <div className="flex flex-wrap gap-2 mb-4">
        {cats.map(c=>
          <button key={c} onClick={()=>setCat(c)}
            className={`px-3 py-1.5 rounded-md text-xs font-semibold ${cat===c?"bg-violet-600 text-white":"bg-slate-800 text-slate-300"}`}>{c}</button>)}
      </div>
      <div className="border border-slate-800 rounded-lg overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-900 text-slate-400 text-xs">
            <tr><th className="text-left px-3 py-2">ATLAS ID</th>
                <th className="text-left px-3 py-2">Attack</th>
                <th className="text-left px-3 py-2">Category</th>
                <th className="text-left px-3 py-2">Risk</th>
                <th className="text-left px-3 py-2">Status</th></tr>
          </thead>
          <tbody>{rows.map(a=>(
            <tr key={a.id} className="border-t border-slate-800">
              <td className="px-3 py-2 font-mono text-xs text-violet-300">{a.id}</td>
              <td className="px-3 py-2 text-slate-200">{a.attack}</td>
              <td className="px-3 py-2"><Chip>{a.cat}</Chip></td>
              <td className="px-3 py-2"><Chip color={riskColor(a.risk)}>{a.risk}</Chip></td>
              <td className="px-3 py-2"><Chip color={statusColor(a.status)}>{a.status}</Chip></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div className="mt-4 text-xs text-slate-400">
        Key controls: confidence gating (min 0.75) · schema validation on MERGE · hash-verified MCP tool descriptions · 6-hop depth limit · 5s query timeout · RBAC scoping via Azure AD.
      </div>
    </Card>
  );
}

function PerformancePanel(){
  const max = Math.max(...PERF.map(p=>p.ms));
  const [hit,setHit] = useState(71);
  const [bench,setBench] = useState(null);
  const runBench = ()=>{
    setBench({running:true});
    setTimeout(()=>{
      const cached = 670 * (1 - (hit-71)/200);
      const cold = 1820;
      setBench({running:false, cached:Math.round(cached), cold, p99:Math.round(cached*1.35)});
    }, 800);
  };
  return (
    <div className="grid grid-cols-12 gap-4">
      <Card className="col-span-12 lg:col-span-7">
        <h3 className="font-semibold text-white mb-3">Latency Breakdown</h3>
        <div className="space-y-2">
          {PERF.map((p,i)=>(
            <div key={i}>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-slate-300">{p.label} {p.note && <span className="text-slate-500">· {p.note}</span>}</span>
                <span className="font-mono text-white">{p.ms} ms</span>
              </div>
              <Bar value={p.ms} max={max} color={p.label.includes("cold")?"#ef4444":p.label.includes("cached")?"#10b981":"#06b6d4"}/>
            </div>
          ))}
        </div>
      </Card>
      <Card className="col-span-12 lg:col-span-5">
        <h3 className="font-semibold text-white mb-3">KV Cache Simulator</h3>
        <div className="flex justify-between text-sm mb-1">
          <span className="text-slate-300">Prefix hit rate</span>
          <span className="font-mono text-white">{hit}%</span>
        </div>
        <input type="range" min="0" max="100" value={hit} onChange={e=>setHit(parseInt(e.target.value))} className="w-full"/>
        <div className="text-xs text-slate-400 mt-1">
          Shared IcM prefix ≈ 4,200 tokens. Token cost multiplier ≈ {(1-(hit/100)*0.46).toFixed(2)}×.
        </div>
        <button onClick={runBench} className="mt-4 px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold">
          {bench?.running?"Running…":"Run benchmark"}
        </button>
        {bench && !bench.running && (
          <div className="mt-4 grid grid-cols-3 gap-2 text-center">
            <div className="border border-slate-800 rounded p-2">
              <div className="text-[10px] text-slate-400">cached</div>
              <div className="text-lg font-mono text-emerald-300">{bench.cached}ms</div>
            </div>
            <div className="border border-slate-800 rounded p-2">
              <div className="text-[10px] text-slate-400">cold</div>
              <div className="text-lg font-mono text-rose-300">{bench.cold}ms</div>
            </div>
            <div className="border border-slate-800 rounded p-2">
              <div className="text-[10px] text-slate-400">p99</div>
              <div className="text-lg font-mono text-amber-300">{bench.p99}ms</div>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

}
