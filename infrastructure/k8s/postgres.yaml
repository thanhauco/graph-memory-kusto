apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: icm-memory }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:latest
          env:
            - { name: POSTGRES_USER,     value: memuser }
            - { name: POSTGRES_PASSWORD, value: mempass }
            - { name: POSTGRES_DB,       value: memdb }
          ports: [ { containerPort: 5432 } ]
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: icm-memory }
spec:
  selector: { app: postgres }
  ports: [ { port: 5432, targetPort: 5432 } ]
