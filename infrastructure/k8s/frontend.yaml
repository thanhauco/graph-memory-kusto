apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: icm-memory }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: icm/frontend-nextjs:latest
          env:
            - { name: BACKEND_URL, value: http://backend:5000 }
          ports: [ { containerPort: 3000 } ]
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: icm-memory }
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports: [ { port: 80, targetPort: 3000 } ]
